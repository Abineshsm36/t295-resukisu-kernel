name: Build ReSukiSU Kernel
on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    steps:
      # 1. Automatically clones your repository and active branch safely
      - name: Checkout Kernel Source
        uses: actions/checkout@v4

      # 2. Strips out the modern compiler flags right in the root folder
      - name: Patch Legacy DTC Flags
        run: |
          if [ -f scripts/Makefile.lib ]; then
            sed -i 's/DTC_FLAGS += -@//g' scripts/Makefile.lib
            sed -i 's/DTC_FLAGS += --allow-missing-phandles//g' scripts/Makefile.lib
          fi
          if [ -f arch/arm64/boot/dts/qcom/Makefile ]; then
            sed -i 's/DTC_FLAGS += -@//g' arch/arm64/boot/dts/qcom/Makefile
          fi

      # 3. Compiles the kernel using the root workspace directory "."
      - name: Compile Android Kernel with SukiSU
        uses: dabao1955/kernel_build_action@main
        with:
          kernel-url: .
          config: lineageos_gtowifi_defconfig
          arch: arm64
          android-version: 12
          aosp-clang: true
          aosp-clang-version: r383902
          aosp-gcc: true
          
          # Force disables Link-Time Optimization to prevent silent log freezes
          disable-lto: true
          
          ksu: true
          ksu-other: true
          ksu-url: https://github.com/SukiSU-Ultra/SukiSU-Ultra
