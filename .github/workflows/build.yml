name: Build SM-T295 ReSukiSU Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y git bc bison flex libssl-dev make \
            libelf-dev gcc-aarch64-linux-gnu python3 zip

      - name: Clone kernel source
        run: |
          git clone --depth=1 \
            https://github.com/LineageOS/android_kernel_samsung_sdm429 \
            -b lineage-22.2 kernel

      - name: Inject ReSukiSU
        run: |
          cd kernel
          curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" | bash

      - name: Enable KSU in defconfig
        run: |
          cd kernel
          # Find the correct defconfig
          DEFCONFIG=$(grep -rl "CONFIG_ARCH_MSM8937" arch/arm64/configs/ | head -1 | xargs basename)
          echo "Using defconfig: $DEFCONFIG"
          echo "CONFIG_KSU=y" >> arch/arm64/configs/$DEFCONFIG
          echo "CONFIG_KSU_MANUAL_HOOK=y" >> arch/arm64/configs/$DEFCONFIG

      - name: Build kernel
        run: |
          cd kernel
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          DEFCONFIG=$(grep -rl "CONFIG_ARCH_MSM8937" arch/arm64/configs/ | head -1 | xargs basename)
          make $DEFCONFIG
          make -j$(nproc) Image.gz-dtb 2>&1 | tee build.log

      - name: Package as flashable zip (AnyKernel3)
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 AK3
          cp kernel/arch/arm64/boot/Image.gz-dtb AK3/
          # Set device name
          sed -i 's/device.name1=/device.name1=gtowifi/' AK3/anykernel.sh
          sed -i 's/device.name2=/device.name2=gtolte/' AK3/anykernel.sh
          cd AK3 && zip -r9 ../T295-ReSukiSU-kernel.zip . -x '*.git*'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: T295-ReSukiSU-kernel
          path: |
            T295-ReSukiSU-kernel.zip
            kernel/build.log
          retention-days: 7
