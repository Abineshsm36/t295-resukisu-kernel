name: Build SukiSU-Ultra Kernel
on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Workspace
        uses: actions/checkout@v4

      - name: Compile Android Kernel with SukiSU
        uses: dabao1955/kernel_build_action@main
        with:
          kernel-url: https://github.com/LineageOS/android_kernel_samsung_sdm429
          kernel-branch: lineage-22.2
          config: lineageos_gtowifi_defconfig
          arch: arm64
          android-version: 15
          ksu: true
          ksu-other: true
          ksu-url: https://github.com/SukiSU-Ultra/SukiSU-Ultra
