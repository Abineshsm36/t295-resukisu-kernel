name: Build SukiSU Legacy Kernel
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Workspace
        uses: actions/checkout@v4

      - name: Compile Qualcomm Kernel
        uses: xiaoxindada/kernel_build_action@main
        with:
          KERNEL_URL: YOUR_K_SOURCE_URL_HERE
          KERNEL_BRANCH: YOUR_K_BRANCH_HERE
          KERNEL_CONFIG: lineageos_gtowifi_defconfig
          ARCH: arm64
          
          # This tells the compiler to use an older, highly-compatible Clang version
          CLANG_VERSION: r383902
          
          # Enables the automated SukiSU-Ultra integration
          KSU: true
          KSU_VERSION: main
